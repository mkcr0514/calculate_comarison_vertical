<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<body>

<style>
:root {
  --color-background-primary: #1C1C1E;
  --color-background-secondary: #2C2C2E;
  --color-background-tertiary: #141414;
  --color-text-primary: #F2F2F7;
  --color-text-secondary: #8E8E93;
  --color-border-primary: #3A3A3C;
  --color-border-secondary: #3A3A3C;
  --color-border-tertiary: #2C2C2E;
  --border-radius-md: 10px;
  --border-radius-lg: 16px;
}

body {
  background: #000;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 40px 20px;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
}

/* 手機外框 */
.phone-shell-outer {
  position: relative;
  width: 405px;
  background: #1A1A1A;
  border-radius: 52px;
  padding: 14px;
  box-shadow:
    0 0 0 1.5px #3A3A3C,
    0 0 0 3px #111,
    0 30px 80px rgba(0,0,0,0.8),
    inset 0 0 0 1px #2C2C2E;
}

/* 動態島 Dynamic Island */
.phone-notch {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 34px;
  background: #000;
  border-radius: 20px;
  z-index: 20;
}
.notch-camera { display: none; }
.notch-speaker { display: none; }

/* 側邊按鈕 */
.phone-side-btn {
  position: absolute;
  background: #2A2A2A;
  border-radius: 2px;
  box-shadow: inset 0 0 0 0.5px #3A3A3C;
}
.btn-volume-up   { left: -4px; top: 110px; width: 4px; height: 34px; }
.btn-volume-down { left: -4px; top: 154px; width: 4px; height: 34px; }
.btn-silent      { left: -4px; top: 76px;  width: 4px; height: 24px; }
.btn-power       { right: -4px; top: 110px; width: 4px; height: 60px; }

* { box-sizing: border-box; margin: 0; padding: 0; }
.phone-shell { width: 375px; height: 812px; border: 2px solid var(--color-border-primary); border-radius: 40px; overflow: hidden; margin: 1.5rem auto; background: var(--color-background-tertiary); display: flex; flex-direction: column; position: relative; }
.status-bar { height: 54px; background: var(--color-background-primary); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; flex-shrink: 0; border-bottom: 0.5px solid var(--color-border-tertiary); position: relative; z-index: 5; }
.status-bar span { font-size: 15px; color: var(--color-text-primary); font-weight: 600; }
.nav-bar { height: 48px; background: var(--color-background-primary); display: flex; align-items: center; padding: 0 16px; justify-content: space-between; flex-shrink: 0; border-bottom: 0.5px solid var(--color-border-tertiary); position: relative; }
.nav-back { font-size: 13px; color: #185FA5; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.nav-back svg { width: 14px; height: 14px; stroke: #185FA5; }
.nav-title { font-size: 17px; font-weight: 500; color: var(--color-text-primary); position: absolute; left: 50%; transform: translateX(-50%); }
.nav-actions { display: flex; align-items: center; gap: 8px; }
.nav-icon-btn { width: 32px; height: 32px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.nav-icon-btn svg { width: 16px; height: 16px; stroke: #185FA5; fill: none; }

.scroll-body { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; display: flex; flex-direction: column; }
.scroll-body::-webkit-scrollbar { display: none; }

.sticky-top { position: sticky; top: 0; z-index: 10; }
.insured-bar { background: var(--color-background-primary); padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--color-border-tertiary); }
.insured-label { font-size: 10px; color: var(--color-text-secondary); margin-bottom: 1px; }
.insured-value { font-size: 12px; color: var(--color-text-primary); font-weight: 500; }
.edit-btn { font-size: 11px; color: #185FA5; border: 0.5px solid #B5D4F4; border-radius: var(--border-radius-md); padding: 4px 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

.single-product-header { background: var(--color-background-primary); padding: 12px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.single-product-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); line-height: 1.5; flex: 1; }
.compare-cta { font-size: 11px; color: #185FA5; white-space: nowrap; cursor: pointer; flex-shrink: 0; border: 0.5px solid #B5D4F4; border-radius: var(--border-radius-md); padding: 5px 10px; margin-top: 2px; }

.ptab-section { background: var(--color-background-primary); border-bottom: 0.5px solid var(--color-border-tertiary); }
.ptab-bar { display: flex; width: 100%; }
.ptab { flex: 1; padding: 9px 8px; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); cursor: pointer; border-bottom: 2px solid transparent; display: flex; align-items: center; justify-content: space-between; min-width: 0; gap: 4px; }
.ptab.active { color: #185FA5; border-bottom-color: #378ADD; }
.ptab-left { display: flex; align-items: center; gap: 4px; min-width: 0; }
.ptab-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.undot { width: 6px; height: 6px; border-radius: 50%; background: #E24B4A; flex-shrink: 0; }
.ptab.filled .undot { display: none; }
.ptab-x { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--color-background-secondary); cursor: pointer; flex-shrink: 0; margin-left: auto; }
.ptab-x svg { width: 8px; height: 8px; stroke: var(--color-text-secondary); }
.add-tab { padding: 9px 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid transparent; flex-shrink: 0; }
.add-icon-circle { width: 20px; height: 20px; border-radius: 50%; background: #E6F1FB; border: 1px solid #B5D4F4; display: flex; align-items: center; justify-content: center; font-size: 15px; color: #185FA5; line-height: 1; }

.fill-zone { background: var(--color-background-primary); border-bottom: 8px solid var(--color-background-tertiary); }
.fill-card { padding: 14px 16px; }
.fill-product-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; margin-bottom: 12px; }
.fields-row { display: flex; gap: 10px; margin-bottom: 4px; }
.field-block { flex: 1; min-width: 0; }
.field-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 5px; }
.field-select-wrap { position: relative; }
.field-select-wrap::after { content: '∨'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: #1D9E75; pointer-events: none; }
.f-select { width: 100%; padding: 9px 28px 9px 10px; border: 1px solid var(--color-border-secondary); border-radius: 10px; font-size: 13px; color: var(--color-text-secondary); background: var(--color-background-primary); appearance: none; -webkit-appearance: none; outline: none; }
.f-select:focus { border-color: #1D9E75; border-width: 1.5px; color: var(--color-text-primary); }
.f-select.err { border-color: #E24B4A; border-width: 1.5px; }
.f-select.has-val { color: var(--color-text-primary); }
.amount-wrap { position: relative; }
.f-input { width: 100%; padding: 9px 28px 9px 10px; border: 1px solid var(--color-border-secondary); border-radius: 10px; font-size: 13px; color: var(--color-text-primary); background: var(--color-background-primary); outline: none; }
.f-input:focus { border-color: #1D9E75; border-width: 1.5px; }
.f-input.err { border-color: #E24B4A; border-width: 1.5px; }
.f-input::placeholder { color: var(--color-text-secondary); }
.amount-unit { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--color-text-secondary); pointer-events: none; }
.fields-feedback { display: flex; gap: 10px; margin-bottom: 6px; }
.field-feedback { flex: 1; height: 14px; font-size: 10px; color: #E24B4A; line-height: 14px; }
.confirm-btn { width: 100%; padding: 11px; background: #1D9E75; color: white; border: none; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer; }
.confirm-btn:disabled { background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: not-allowed; }
.display-fields { display: flex; gap: 10px; cursor: pointer; }
.display-block { flex: 1; min-width: 0; }
.display-val { width: 100%; padding: 9px 10px; border: 1px solid var(--color-border-secondary); border-radius: 10px; font-size: 13px; color: var(--color-text-primary); text-align: center; background: var(--color-background-primary); }

/* compare toolbar */
.sticky-compare { position: sticky; top: 53px; z-index: 9; }
.compare-toolbar { background: var(--color-background-primary); display: flex; align-items: center; border-bottom: 0.5px solid var(--color-border-tertiary); }
.ctab-bar { display: flex; flex: 1; }
.ctab { flex: 1; padding: 10px 4px; font-size: 12px; color: var(--color-text-secondary); cursor: pointer; border-bottom: 2px solid transparent; text-align: center; }
.ctab.active { color: #185FA5; font-weight: 500; border-bottom-color: #378ADD; }
.diff-wrap { padding: 0 10px; flex-shrink: 0; border-left: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 5px; height: 40px; }
.diff-label { font-size: 10px; white-space: nowrap; color: var(--color-text-secondary); }
.diff-label.on { color: var(--color-text-primary); }
.dtog { width: 28px; height: 16px; border-radius: 8px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); position: relative; flex-shrink: 0; transition: background 0.15s; }
.dtog.can { cursor: pointer; }
.dtog.disabled { opacity: 0.3; }
.dtog.on { background: #378ADD; border-color: #378ADD; }
.dtog-dot { width: 12px; height: 12px; border-radius: 50%; background: white; position: absolute; top: 1px; left: 1px; transition: left 0.15s; }
.dtog.on .dtog-dot { left: 14px; }

.sections-area { flex: 1; padding-bottom: 24px; }
.empty-hint { padding: 28px 16px; font-size: 12px; color: var(--color-text-secondary); text-align: center; line-height: 1.9; }

.section-block { background: var(--color-background-primary); margin-bottom: 8px; }
.section-header { padding: 9px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; }
.section-label { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.section-meta { display: flex; align-items: center; gap: 6px; }
.same-badge { font-size: 9px; padding: 2px 5px; border-radius: 3px; background: var(--color-background-secondary); color: var(--color-text-secondary); }
.col-btn { font-size: 13px; color: var(--color-text-secondary); user-select: none; }
.section-rows { overflow: hidden; transition: max-height 0.2s ease; }
.section-rows.collapsed { max-height: 0 !important; }

.single-result-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.single-result-row:last-child { border-bottom: none; }
.single-result-label { font-size: 13px; color: var(--color-text-primary); }
.single-result-val { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.single-result-unit { font-size: 11px; color: var(--color-text-secondary); margin-left: 2px; }
.single-result-none { font-size: 13px; color: var(--color-text-secondary); }

.item-row { display: flex; align-items: center; padding: 8px 16px; gap: 8px; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; transition: background 0.1s; }
.item-row:last-child { border-bottom: none; }
.item-row.hl { background: #E6F1FB; }
.row-bar { width: 3px; height: 28px; border-radius: 2px; flex-shrink: 0; }
.ca { background: #378ADD; } .cb { background: #1D9E75; } .cc { background: #D85A30; }
.row-name { flex: 1; min-width: 0; font-size: 11px; color: var(--color-text-secondary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.item-row.hl .row-name { color: #185FA5; }
.row-val { flex-shrink: 0; text-align: right; min-width: 60px; }
.v-amt { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.v-unit { font-size: 10px; color: var(--color-text-secondary); margin-top: 1px; }
.item-row.hl .v-amt { color: #185FA5; }
.v-empty { font-size: 13px; color: var(--color-border-secondary); }
.v-none { font-size: 12px; color: var(--color-text-secondary); }

.overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: flex-end; z-index: 20; }
.overlay.open { display: flex; }
.sheet { width: 100%; background: var(--color-background-primary); border-radius: 20px 20px 0 0; padding: 16px; max-height: 80%; overflow-y: auto; }
.sheet-handle { width: 36px; height: 4px; background: var(--color-border-primary); border-radius: 2px; margin: 0 auto 14px; }
.sheet-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 3px; }
.sheet-sub { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 14px; }
.modal-item { padding: 12px 0; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
.modal-item:last-child { border-bottom: none; }
.mcheck { width: 18px; height: 18px; border: 1.5px solid var(--color-border-secondary); border-radius: 3px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; }
.mcheck.checked { background: #378ADD; border-color: #378ADD; }
.mcheck.checked::after { content: ''; width: 10px; height: 6px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translateY(-1px); display: block; }
.mpname { font-size: 13px; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; margin-bottom: 3px; }
.mpmeta { font-size: 11px; color: var(--color-text-secondary); }
.sheet-btn { width: 100%; margin-top: 14px; padding: 12px; background: #378ADD; color: white; border: none; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; }
.sheet-btn:disabled { background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: not-allowed; }
.sheet-btn-ghost { width: 100%; margin-top: 8px; padding: 12px; background: transparent; color: var(--color-text-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; cursor: pointer; }

.dialog-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 30; padding: 32px; }
.dialog-overlay.open { display: flex; }
.dialog { background: var(--color-background-primary); border-radius: var(--border-radius-lg); padding: 20px; width: 100%; }
.dialog-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
.dialog-body { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 16px; }
.dialog-body strong { color: var(--color-text-primary); font-weight: 500; }
.dialog-btns { display: flex; gap: 8px; }
.dialog-cancel { flex: 1; padding: 10px; background: var(--color-background-secondary); color: var(--color-text-primary); border: none; border-radius: var(--border-radius-md); font-size: 14px; cursor: pointer; }
.dialog-confirm { flex: 1; padding: 10px; background: #E24B4A; color: white; border: none; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; }
.annotation { font-size: 11px; color: var(--color-text-secondary); text-align: center; margin-top: 6px; line-height: 1.7; }
</style>

</div>

let collapsedSections={};
let diffMode=false;
let addSelected=[];
let pendingDeleteId=null;

function getVal(pid,key){const amt=filledAmounts[pid];if(!amt)return null;const r=allProducts[pid].ratios[key];if(r===null)return'none';return{amt:(Math.round(amt*r/100)*100).toLocaleString(),unit:keyUnits[key]};}
function allFilled(){return activeProducts.length>1&&activeProducts.every(p=>filledAmounts[p.id]);}
function anyFilled(){return activeProducts.some(p=>filledAmounts[p.id]);}
function isSame(key){if(activeProducts.length<2||!activeProducts.every(p=>filledAmounts[p.id]))return false;const vals=activeProducts.map(p=>{const r=p.ratios[key];return r===null?null:Math.round(filledAmounts[p.id]*r/100)*100;});if(vals.some(v=>v===null))return false;return vals.every(v=>v===vals[0]);}

function updateNavActions(){
  const actions=document.getElementById('nav-actions');
  if(!anyFilled()){actions.innerHTML='';return;}
  actions.innerHTML=`
    <div class="nav-icon-btn" id="save-icon" title="保存結果">
      <svg viewBox="0 0 16 16" stroke-width="1.5"><path d="M3,14 L3,9 L13,9 L13,14"/><path d="M5,2 L5,6 L11,6"/><rect x="3" y="2" width="10" height="12" rx="1" opacity="0"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
    </div>
    <div class="nav-icon-btn" id="share-icon" title="分享結果">
      <svg viewBox="0 0 16 16" stroke-width="1.5"><path d="M8,2 L8,10"/><polyline points="5,5 8,2 11,5"/><path d="M4,7 L3,7 C2.4,7 2,7.4 2,8 L2,13 C2,13.6 2.4,14 3,14 L13,14 C13.6,14 14,13.6 14,13 L14,8 C14,7.4 13.6,7 13,7 L12,7"/></svg>
    </div>`;
  document.getElementById('save-icon').addEventListener('click',()=>alert('保存結果'));
  document.getElementById('share-icon').addEventListener('click',()=>alert('分享結果'));
}

function updateDiffToggle(){
  const wrap=document.getElementById('diff-wrap');
  const tog=document.getElementById('dtog');
  const label=document.getElementById('diff-label');
  if(activeProducts.length<=1){wrap.style.visibility='hidden';return;}
  wrap.style.visibility='visible';
  if(allFilled()){tog.classList.remove('disabled');tog.classList.add('can');label.classList.add('on');}
  else{tog.classList.add('disabled');tog.classList.remove('can','on');tog.querySelector('.dtog-dot').style.left='1px';label.classList.remove('on');diffMode=false;}
}

function setActiveProduct(idx){
  activePIdx=idx;
  renderProductHeader();
  renderFillCard();
  renderSections();
}

function renderProductHeader(){
  const area=document.getElementById('product-header-area');
  if(activeProducts.length===1){
    area.innerHTML=`<div class="single-product-header"><div class="single-product-name">${activeProducts[0].full}</div><div class="compare-cta" id="single-cta">比較同類商品</div></div>`;
    document.getElementById('single-cta').addEventListener('click',openAddModal);
  } else {
    const bar=document.createElement('div');
    bar.className='ptab-section';
    const tabBar=document.createElement('div');
    tabBar.className='ptab-bar';
    activeProducts.forEach((p,i)=>{
      const t=document.createElement('div');
      const isFilled=!!filledAmounts[p.id];
      const isActive=i===activePIdx;
      t.className=`ptab${isActive?' active':''}${isFilled?' filled':''}`;
      t.innerHTML=`<div class="ptab-left"><span class="ptab-label">${tabNames[i]}</span>${!isFilled?'<span class="undot"></span>':''}</div>${isActive?`<span class="ptab-x" data-id="${p.id}"><svg viewBox="0 0 8 8" fill="none" stroke-width="1.5"><line x1="1" y1="1" x2="7" y2="7"/><line x1="7" y1="1" x2="1" y2="7"/></svg></span>`:''}`;
      t.addEventListener('click',(e)=>{if(e.target.closest('.ptab-x'))return;setActiveProduct(i);});
      const xBtn=t.querySelector('.ptab-x');
      if(xBtn){
        xBtn.addEventListener('click',(e)=>{
          e.stopPropagation();
          pendingDeleteId=parseInt(xBtn.dataset.id);
          const prod=allProducts[pendingDeleteId];
          document.getElementById('del-body').innerHTML=`確定要移除「<strong>${prod.full}</strong>」嗎？已填寫的條件將會清除。`;
          document.getElementById('del-dialog').classList.add('open');
        });
      }
      tabBar.appendChild(t);
    });
    if(activeProducts.length<3){
      const addT=document.createElement('div');
      addT.className='add-tab';
      addT.innerHTML=`<div class="add-icon-circle">+</div>`;
      addT.addEventListener('click',openAddModal);
      tabBar.appendChild(addT);
    }
    bar.appendChild(tabBar);
    area.innerHTML='';
    area.appendChild(bar);
  }
}

function renderFillCard(){
  const p=activeProducts[activePIdx];
  const pid=p.id;
  const isEditing=editingMode[pid]||!filledAmounts[pid];
  const showName=activeProducts.length>1;
  const card=document.getElementById('fill-card');
  if(isEditing){
    card.innerHTML=`
      ${showName?`<div class="fill-product-name">${p.full}</div>`:''}
      <div class="fields-row">
        <div class="field-block">
          <div class="field-label">繳費年期</div>
          <div class="field-select-wrap">
            <select class="f-select" id="f-period"><option value="">請選擇</option><option>10年期</option><option>20年期</option><option>30年期</option><option>終身繳</option></select>
          </div>
        </div>
        <div class="field-block">
          <div class="field-label">保額／日額</div>
          <div class="amount-wrap">
            <input class="f-input" id="f-amount" type="number" placeholder="${p.ph}" value="${filledAmounts[pid]||''}">
            <span class="amount-unit">元</span>
          </div>
        </div>
      </div>
      <div class="fields-feedback"><div class="field-feedback" id="fb-period"></div><div class="field-feedback" id="fb-amount"></div></div>
      <button class="confirm-btn" id="confirm-btn" disabled>確認</button>`;
    const sel=card.querySelector('#f-period');
    const inp=card.querySelector('#f-amount');
    const btn=card.querySelector('#confirm-btn');
    function checkEnable(){btn.disabled=!sel.value||!inp.value;}
    sel.addEventListener('change',checkEnable);
    inp.addEventListener('input',checkEnable);
    btn.addEventListener('click',()=>{
      const period=sel.value;
      const amt=parseInt(inp.value);
      let ok=true;
      if(!period){card.querySelector('#fb-period').textContent='請選擇繳費年期';sel.classList.add('err');ok=false;}else{card.querySelector('#fb-period').textContent='';sel.classList.remove('err');}
      if(!amt||amt<p.min||amt>p.max||amt%100!==0){card.querySelector('#fb-amount').textContent=`請輸入 ${p.min}–${p.max} 元`;inp.classList.add('err');ok=false;}else{card.querySelector('#fb-amount').textContent='';inp.classList.remove('err');}
      if(!ok)return;
      filledAmounts[pid]=amt;
      editingMode[pid]=false;
      renderProductHeader();renderFillCard();updateDiffToggle();updateNavActions();renderSections();
      if(activePIdx<activeProducts.length-1){activePIdx++;renderProductHeader();renderFillCard();}
    });
  } else {
    card.innerHTML=`
      ${showName?`<div class="fill-product-name">${p.full}</div>`:''}
      <div class="display-fields" id="display-fields">
        <div class="display-block"><div class="field-label">繳費年期</div><div class="display-val">20年期</div></div>
        <div class="display-block"><div class="field-label">保額／日額</div><div class="display-val">${filledAmounts[pid].toLocaleString()} 元</div></div>
      </div>`;
    card.querySelector('#display-fields').addEventListener('click',()=>{editingMode[pid]=true;renderFillCard();});
  }
}

function renderSections(){
  const area=document.getElementById('sections-area');
  area.innerHTML='';
  if(!anyFilled()){area.innerHTML=`<div class="empty-hint">請填寫上方繳費年期與保額<br>即可顯示保障金額</div>`;return;}
  const isSingle=activeProducts.length===1;
  tabs[activeCompareTab].keys.forEach(key=>{
    const same=isSame(key);
    // 只看差異模式：相同項目強制收合
    const forceCollapse=diffMode&&same;
    const isCol=forceCollapse||!!collapsedSections[key];
    const block=document.createElement('div');
    block.className='section-block';
    if(isSingle){
      const p=activeProducts[0];
      const v=getVal(p.id,key);
      let html='';
      if(!filledAmounts[p.id])html=`<div class="single-result-row"><span class="single-result-label">${keyLabels[key]}</span><span class="v-empty">–</span></div>`;
      else if(v==='none')html=`<div class="single-result-row"><span class="single-result-label">${keyLabels[key]}</span><span class="single-result-none">不含</span></div>`;
      else html=`<div class="single-result-row"><span class="single-result-label">${keyLabels[key]}</span><span><span class="single-result-val">${v.amt}</span><span class="single-result-unit">${v.unit}</span></span></div>`;
      block.innerHTML=html;
    } else {
      const rowsHtml=activeProducts.map((p,i)=>{
        const isHl=i===activePIdx?'hl':'';
        const v=getVal(p.id,key);
        let valHtml;
        if(!filledAmounts[p.id])valHtml=`<div class="v-empty">–</div>`;
        else if(v==='none')valHtml=`<div class="v-none">不含</div>`;
        else valHtml=`<div class="v-amt">${v.amt}</div><div class="v-unit">${v.unit}</div>`;
        return`<div class="item-row ${isHl}" data-pidx="${i}"><div class="row-bar ${p.color}"></div><div class="row-name">${p.full}</div><div class="row-val">${valHtml}</div></div>`;
      }).join('');
      const sameBadge=(same&&allFilled())?`<span class="same-badge">三個相同</span>`:'';
      block.innerHTML=`<div class="section-header"><span class="section-label">${keyLabels[key]}</span><div class="section-meta">${sameBadge}<span class="col-btn">${isCol?'+':'−'}</span></div></div><div class="section-rows${isCol?' collapsed':''}" style="max-height:${isCol?'0':'500px'}">${rowsHtml}</div>`;
      block.querySelector('.section-header').addEventListener('click',()=>{
        if(forceCollapse)return; // 只看差異模式下相同項目不讓展開
        collapsedSections[key]=!collapsedSections[key];renderSections();
      });
      block.querySelectorAll('.item-row').forEach(row=>{
        row.addEventListener('click',()=>{setActiveProduct(parseInt(row.dataset.pidx));});
      });
    }
    area.appendChild(block);
  });
}

function openAddModal(){
  addSelected=[];
  const available=allProducts.filter(p=>!activeProducts.find(ap=>ap.id===p.id));
  const maxAdd=3-activeProducts.length;
  document.getElementById('add-sub').textContent=`請勾選至多 ${maxAdd} 個商品`;
  const list=document.getElementById('add-list');
  list.innerHTML='';
  available.forEach(p=>{
    const item=document.createElement('div');
    item.className='modal-item';
    item.innerHTML=`<div class="mcheck" data-id="${p.id}"></div><div><div class="mpname">${p.full}</div><div class="mpmeta">主約・外溢型</div></div>`;
    item.addEventListener('click',()=>{
      const idx=addSelected.indexOf(p.id);
      if(idx>-1){addSelected.splice(idx,1);item.querySelector('.mcheck').classList.remove('checked');}
      else if(addSelected.length<maxAdd){addSelected.push(p.id);item.querySelector('.mcheck').classList.add('checked');}
      document.getElementById('add-confirm-btn').disabled=addSelected.length===0;
    });
    list.appendChild(item);
  });
  document.getElementById('add-confirm-btn').disabled=true;
  document.getElementById('add-overlay').classList.add('open');
}

document.getElementById('add-confirm-btn').addEventListener('click',()=>{
  addSelected.forEach(id=>activeProducts.push(allProducts[id]));
  activePIdx=activeProducts.length-addSelected.length;
  document.getElementById('add-overlay').classList.remove('open');
  renderProductHeader();renderFillCard();updateDiffToggle();renderSections();
});
document.getElementById('add-cancel-btn').addEventListener('click',()=>document.getElementById('add-overlay').classList.remove('open'));
document.getElementById('add-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('add-overlay'))document.getElementById('add-overlay').classList.remove('open');});
document.getElementById('del-cancel').addEventListener('click',()=>{document.getElementById('del-dialog').classList.remove('open');pendingDeleteId=null;});
document.getElementById('del-confirm').addEventListener('click',()=>{
  if(pendingDeleteId===null)return;
  activeProducts=activeProducts.filter(p=>p.id!==pendingDeleteId);
  delete filledAmounts[pendingDeleteId];
  delete editingMode[pendingDeleteId];
  activePIdx=Math.min(activePIdx,activeProducts.length-1);
  document.getElementById('del-dialog').classList.remove('open');
  pendingDeleteId=null;
  renderProductHeader();renderFillCard();updateDiffToggle();updateNavActions();renderSections();
});
document.querySelectorAll('.ctab').forEach(t=>{
  t.addEventListener('click',()=>{
    activeCompareTab=t.dataset.tab;
    document.querySelectorAll('.ctab').forEach(x=>x.classList.toggle('active',x.dataset.tab===activeCompareTab));
    renderSections();
  });
});
document.getElementById('dtog').addEventListener('click',()=>{
  if(!allFilled())return;
  diffMode=!diffMode;
  const tog=document.getElementById('dtog');
  tog.classList.toggle('on',diffMode);
  tog.querySelector('.dtog-dot').style.left=diffMode?'14px':'1px';
  renderSections();
});

renderProductHeader();renderFillCard();updateDiffToggle();updateNavActions();renderSections();
</script>
</body>
</html>
